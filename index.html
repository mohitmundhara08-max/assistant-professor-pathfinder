<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant Professor Pathway Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f7f4; --card: #fff; --accent: #e63462; --accent2: #1a1a2e;
  --text: #1a1a2e; --text2: #5a5a7a; --border: #e8e6e1;
  --green: #0d9f6e; --amber: #d97706; --red: #dc2626;
  --grad1: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  --grad2: linear-gradient(135deg, #e63462 0%, #fe4a72 100%);
  --shadow: 0 1px 3px rgba(26,26,46,0.06), 0 6px 16px rgba(26,26,46,0.04);
  --shadow2: 0 4px 24px rgba(230,52,98,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', 'Noto Sans Devanagari', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.wrap { max-width: 960px; margin: 0 auto; padding: 0 16px 40px; }

/* Header */
.header { background: var(--grad1); padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { height: 36px; }
.header h1 { color: #fff; font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
.header h1 span { color: var(--accent); }
.lang-toggle { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 7px 14px; border-radius: 20px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.lang-toggle:hover { background: rgba(255,255,255,0.2); }

/* Tabs */
.tabs { display: flex; background: var(--card); border-bottom: 2px solid var(--border); border-radius: 12px 12px 0 0; margin-top: 24px; overflow: hidden; box-shadow: var(--shadow); }
.tab { flex: 1; padding: 14px 8px; text-align: center; cursor: pointer; font-weight: 500; font-size: 13px; color: var(--text2); transition: all 0.25s; border-bottom: 3px solid transparent; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(230,52,98,0.04); }
.tab:hover:not(.active) { background: rgba(26,26,46,0.02); }

/* Panels */
.panel { display: none; background: var(--card); padding: 28px 24px; border-radius: 0 0 12px 12px; box-shadow: var(--shadow); }
.panel.active { display: block; }

/* Form */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.field { display: flex; flex-direction: column; }
.field.full { grid-column: 1 / -1; }
.field label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.field select, .field input { padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; background: var(--bg); cursor: pointer; transition: border 0.2s; color: var(--text); }
.field select:focus, .field input:focus { outline: none; border-color: var(--accent); }
.btn-row { grid-column: 1 / -1; display: flex; gap: 10px; margin-top: 8px; }
button { font-family: inherit; cursor: pointer; transition: all 0.2s; }
.btn-primary { flex: 1; padding: 13px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; background: var(--grad2); color: #fff; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow2); }
.btn-reset { padding: 13px 20px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-weight: 500; background: var(--card); color: var(--text2); }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,46,0.5); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--card); border-radius: 16px; padding: 32px; width: 90%; max-width: 420px; box-shadow: 0 20px 60px rgba(26,26,46,0.3); }
.modal h3 { font-size: 18px; margin-bottom: 4px; }
.modal p { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
.modal .field { margin-bottom: 14px; }
.modal .btn-row { margin-top: 16px; }
.modal .btn-cancel { padding: 12px 20px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text2); font-size: 14px; }
.error-msg { color: var(--red); font-size: 12px; margin-top: 3px; display: none; }

/* Results */
.results { margin-top: 20px; }
.snapshot { background: linear-gradient(135deg, #fef2f6, #fff5f8); border-left: 4px solid var(--accent); padding: 16px; border-radius: 0 10px 10px 0; margin-bottom: 18px; font-size: 14px; line-height: 1.6; }
.sec-title { font-size: 12px; font-weight: 700; color: var(--accent); margin: 22px 0 10px; text-transform: uppercase; letter-spacing: 0.8px; }
.card { border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 10px; transition: box-shadow 0.2s; background: var(--card); }
.card:hover { box-shadow: var(--shadow); }
.card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.card-name { font-weight: 700; font-size: 15px; }
.card-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.badge { padding: 4px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; }
.badge.elig { background: #d1fae5; color: #065f46; }
.badge.maybe { background: #fef3c7; color: #92400e; }
.badge.not { background: #fee2e2; color: #991b1b; }
.card-body { font-size: 13px; line-height: 1.55; color: var(--text); }
.card-body strong { color: var(--accent2); }

/* Benefits */
.ben-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.ben { background: var(--bg); padding: 14px; border-radius: 8px; border-left: 3px solid var(--green); font-size: 13px; line-height: 1.5; }
.ben strong { color: var(--green); display: block; margin-bottom: 2px; font-size: 12px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
th { background: var(--bg); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; }
td a { color: var(--accent); text-decoration: none; font-weight: 600; }
.highlight { background: #ecfdf5; padding: 14px; border-radius: 8px; border-left: 4px solid var(--green); margin: 14px 0; font-size: 13px; line-height: 1.6; }
.disclaimer { margin-top: 18px; padding: 12px; background: #fef3c7; border-radius: 8px; font-size: 12px; color: #78350f; line-height: 1.5; }
@media (max-width: 640px) {
  .form-grid, .ben-grid { grid-template-columns: 1fr; }
  .header { flex-wrap: wrap; gap: 10px; }
  .header h1 { font-size: 14px; }
  .panel { padding: 20px 16px; }
  table { font-size: 11px; }
  th, td { padding: 7px 5px; }
}
</style>
</head>

<div class="header">

  <!-- TAB 0: Profile -->
  <div class="panel active" id="panel0">

          <option value="ugc-jrf" id="opt_ugcjrf"></option>
          <option value="planning" id="opt_planning"></option>
          <option value="appeared" id="opt_appeared"></option>
        </select>
      </div>
      <div class="field"><label id="lbl_subject"></label>
        <select id="subject"><option value=""></option></select>
      </div>
      <div class="field"><label id="lbl_cat"></label>
        <select id="cat"><option value=""></option>
          <option value="gen" id="opt_gen"></option>
          <option value="obc" id="opt_obc"></option>
          <option value="sc" id="opt_sc"></option>
          <option value="st" id="opt_st"></option>
          <option value="pwd" id="opt_pwd"></option>
        </select>
      </div>
      <div class="field"><label id="lbl_marks"></label>
        <select id="marks"><option value=""></option>
          <option value="lt50" id="opt_lt50"></option>
          <option value="50-55" id="opt_5055"></option>
          <option value="gte55" id="opt_gte55"></option>
        </select>
      </div>
      <div class="field"><label id="lbl_phd"></label>
        <select id="phd"><option value=""></option>
          <option value="none" id="opt_phdnone"></option>
          <option value="ongoing" id="opt_phdongoing"></option>
          <option value="awarded" id="opt_phdawarded"></option>
        </select>
      </div>
      <div class="field"><label id="lbl_state"></label>
        <select id="state"><option value=""></option></select>
      </div>
      <div class="field"><label id="lbl_geo"></label>
        <select id="geo"><option value=""></option>
          <option value="home" id="opt_home"></option>
          <option value="multi" id="opt_multi"></option>
          <option value="any" id="opt_any"></option>
        </select>
      </div>
      <div class="field"><label id="lbl_inst"></label>
        <select id="inst"><option value=""></option>
          <option value="central" id="opt_central"></option>
          <option value="state" id="opt_stateuni"></option>
          <option value="anyinst" id="opt_anyinst"></option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn-reset" onclick="resetForm()" id="btnReset"></button>
        <button class="btn-primary" onclick="showModal()" id="btnAnalyze"></button>
      </div>
    </div>
    <div class="results" id="results"></div>
  </div>

  <!-- TAB 1: State SET -->
  <div class="panel" id="panel1">
    <p class="sec-title" id="setTitle"></p>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px;" id="setDesc"></p>
    <div id="setList"></div>
  </div>

  <!-- TAB 2: Benefits -->
  <div class="panel" id="panel2"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalDesc"></p>
    <div class="field">
      <label id="lbl_name"></label>
      <input type="text" id="userName" maxlength="50">
      <div class="error-msg" id="nameErr"></div>
    </div>
    <div class="field">
      <label id="lbl_phone"></label>
      <input type="tel" id="userPhone" maxlength="10" pattern="[0-9]*" inputmode="numeric">
      <div class="error-msg" id="phoneErr"></div>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="hideModal()" id="btnCancel"></button>
      <button class="btn-primary" onclick="analyze()" id="btnSubmit"></button>
    </div>
  </div>
</div>

  PB:{name:"Punjab SET",body:{en:"Punjabi University, Patiala",hi:"पंजाबी विश्वविद्यालय, पटियाला"},subjects:{en:"20+ incl. Punjabi",hi:"पंजाबी सहित 20+"},freq:{en:"Irregular",hi:"अनियमित"},fee:"Varies",validity:{en:"Punjab only",hi:"केवल पंजाब"},web:"https://www.punjabiuniversity.ac.in",notes:{en:"Punjabi literature paper exclusive here.",hi:"पंजाबी साहित्य प्रश्नपत्र यहां विशेष है।"}},
  HR:{name:"Haryana",body:{en:"No SET — uses UGC NET",hi:"कोई SET नहीं — UGC NET उपयोग"},subjects:{en:"N/A",hi:"लागू नहीं"},freq:{en:"N/A",hi:"लागू नहीं"},fee:"N/A",validity:{en:"UGC NET directly",hi:"सीधे UGC NET"},web:"https://hpsc.gov.in",notes:{en:"Haryana does NOT conduct its own SET. HPSC recruits APs via UGC NET.",hi:"हरियाणा अपना SET आयोजित नहीं करता। HPSC, UGC NET के माध्यम से AP भर्ती करता है।"}},
  NE:{name:"NE-SLET",body:{en:"SLET Commission, Assam",hi:"SLET आयोग, असम"},subjects:{en:"25+ subjects",hi:"25+ विषय"},freq:{en:"Annual",hi:"वार्षिक"},fee:"~₹1000",validity:{en:"8 NE states: Assam, Arunachal, Manipur, Meghalaya, Mizoram, Nagaland, Sikkim, Tripura",hi:"8 पूर्वोत्तर राज्य"},web:"https://www.sletne.org",notes:{en:"BEST multi-state coverage — one exam, 8 states of eligibility. Highest ROI of any SET.",hi:"सर्वश्रेष्ठ बहु-राज्य कवरेज — एक परीक्षा, 8 राज्यों की पात्रता। किसी भी SET का सबसे अधिक ROI।"}},
  DL:{name:"Delhi / UT",body:{en:"No SET — UGC NET used",hi:"कोई SET नहीं — UGC NET"},subjects:{en:"N/A",hi:"लागू नहीं"},freq:{en:"N/A",hi:"लागू नहीं"},fee:"N/A",validity:{en:"UGC NET",hi:"UGC NET"},web:"https://ugcnet.nta.ac.in",notes:{en:"Delhi has no separate SET. All Delhi colleges recruit via UGC NET + institutional processes.",hi:"दिल्ली में कोई अलग SET नहीं। सभी दिल्ली कॉलेज UGC NET + संस्थागत प्रक्रियाओं से भर्ती करते हैं।"}},
};
const NO_SET_STATES = ['HR','DL','BR','JH'];

function t(key) { return T[lang][key] || key; }
function toggleLang() {
  lang = lang === 'en' ? 'hi' : 'en';
  applyLang();
}
function applyLang() {
  document.getElementById('mainTitle').innerHTML = t('mainTitle');
  document.getElementById('langBtn').textContent = t('langBtn');
  ['tab0','tab1','tab2','lbl_net','lbl_subject','lbl_cat','lbl_marks','lbl_phd','lbl_state',
   'lbl_geo','lbl_inst','opt_ugcap','opt_ugcjrf','opt_planning','opt_appeared',
   'opt_gen','opt_obc','opt_sc','opt_st','opt_pwd','opt_lt50','opt_5055','opt_gte55',
   'opt_phdnone','opt_phdongoing','opt_phdawarded','opt_home','opt_multi','opt_any',
   'opt_central','opt_stateuni','opt_anyinst','btnReset','btnAnalyze',
   'modalTitle','modalDesc','lbl_name','lbl_phone','btnCancel','btnSubmit','setTitle','setDesc'
  ].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = t(id);
  });
  // Update select defaults
  document.querySelectorAll('select option[value=""]').forEach(o => o.textContent = t('select'));
  populateSubjects();
  populateStates();
  renderSetList();
  renderBenefitsTab();
}

function populateSubjects() {
  const sel = document.getElementById('subject');
  const val = sel.value;
  const subs = lang === 'en' ? SUBJECTS_EN : SUBJECTS_HI;
  sel.innerHTML = `<option value="">${t('select')}</option>`;
  subs.forEach((s,i) => {
    const o = document.createElement('option');
    o.value = SUBJECTS_EN[i]; o.textContent = s;
    sel.appendChild(o);
  });
  sel.value = val;
}
function populateStates() {
  const sel = document.getElementById('state');
  const val = sel.value;
  sel.innerHTML = `<option value="">${t('select')}</option>`;
  STATES.forEach(s => {
    const o = document.createElement('option');
    o.value = s.v; o.textContent = s[lang];
    sel.appendChild(o);
  });
  sel.value = val;
}

function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t,idx) => t.classList.toggle('active', idx===i));
  document.querySelectorAll('.panel').forEach((p,idx) => p.classList.toggle('active', idx===i));
}

function renderSetList() {
  let html = '';
  Object.entries(SETS).forEach(([code, s]) => {
    html += `<div class="card"><div class="card-head"><div><div class="card-name">${s.name}</div><div class="card-sub">${s.body[lang]}</div></div><a href="${s.web}" target="_blank" class="badge elig" style="text-decoration:none;">Official ↗</a></div><div class="card-body"><strong>${lang==='en'?'Validity':'वैधता'}:</strong> ${s.validity[lang]}<br><strong>${lang==='en'?'Subjects':'विषय'}:</strong> ${s.subjects[lang]}<br><strong>${lang==='en'?'Frequency':'आवृत्ति'}:</strong> ${s.freq[lang]} &nbsp;|&nbsp; <strong>${lang==='en'?'Fee':'शुल्क'}:</strong> ${s.fee}<br><em style="color:var(--text2);">${s.notes[lang]}</em></div></div>`;
  });
  document.getElementById('setList').innerHTML = html;
}

function renderBenefitsTab() {
  const p = document.getElementById('panel2');
  p.innerHTML = `
    <div class="sec-title">${t('ben_tab_title')}</div>
    <div class="highlight"><strong>${lang==='en'?'Short answer':'संक्षिप्त उत्तर'}:</strong> ${t('ben_tab_short')}</div>
    <div class="ben-grid">
      ${['b1','b2','b3','b4','b5','b6','b7','b8'].map(k => `<div class="ben"><strong>${t(k+'t')}</strong>${t(k+'d')}</div>`).join('')}
    </div>
    <div class="sec-title">NET vs SET</div>
    <table><thead><tr><th>${t('cmp_param')}</th><th>${t('cmp_net')}</th><th>${t('cmp_set')}</th></tr></thead><tbody>
      <tr><td>${lang==='en'?'Conducting body':'संचालन निकाय'}</td><td>${t('cmp_body_net')}</td><td>${t('cmp_body_set')}</td></tr>
      <tr><td>${lang==='en'?'Validity':'वैधता'}</td><td>${t('cmp_valid_net')}</td><td>${t('cmp_valid_set')}</td></tr>
      <tr><td>${lang==='en'?'Frequency':'आवृत्ति'}</td><td>${t('cmp_freq_net')}</td><td>${t('cmp_freq_set')}</td></tr>
      <tr><td>${lang==='en'?'Age limit':'आयु सीमा'}</td><td>${t('cmp_age_net')}</td><td>${t('cmp_age_set')}</td></tr>
      <tr><td>${lang==='en'?'Min marks':'न्यूनतम अंक'}</td><td>${t('cmp_marks_net')}</td><td>${t('cmp_marks_set')}</td></tr>
      <tr><td>${lang==='en'?'Competition':'प्रतिस्पर्धा'}</td><td>${t('cmp_comp_net')}</td><td>${t('cmp_comp_set')}</td></tr>
      <tr><td>JRF</td><td>${t('cmp_jrf_net')}</td><td>${t('cmp_jrf_set')}</td></tr>
    </tbody></table>
    <div class="disclaimer">${t('ben_tip')}</div>`;
}

function showModal() {
  const fields = ['net','subject','cat','marks','phd','state','geo','inst'];
  for (const f of fields) { if (!document.getElementById(f).value) { alert(t('fillAll')); return; } }
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('userName').focus();
}
function hideModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function resetForm() {
  ['net','subject','cat','marks','phd','state','geo','inst'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('results').innerHTML = '';
}

function analyze() {
  const name = document.getElementById('userName').value.trim();
  const phone = document.getElementById('userPhone').value.trim();
  let valid = true;
  if (!name || name.length < 2) { document.getElementById('nameErr').style.display='block'; document.getElementById('nameErr').textContent=t('nameErr'); valid=false; }
  else { document.getElementById('nameErr').style.display='none'; }
  if (!/^[6-9]\d{9}$/.test(phone)) { document.getElementById('phoneErr').style.display='block'; document.getElementById('phoneErr').textContent=t('phoneErr'); valid=false; }
  else { document.getElementById('phoneErr').style.display='none'; }
  if (!valid) return;
  hideModal();
  runAnalysis(name);
}

function runAnalysis(name) {
  const net=v('net'), subject=v('subject'), cat=v('cat'), marks=v('marks'), phd=v('phd'), state=v('state'), geo=v('geo'), inst=v('inst');
  const reserved = cat !== 'gen';
  const marksOK = marks === 'gte55' || (reserved && marks === '50-55');
  const netCleared = net === 'ugc-ap' || net === 'ugc-jrf';
  const appeared = net === 'appeared';
  const hasPhD = phd === 'awarded';

  let html = '';
  // Snapshot
  let snap = `<strong>${t('profile')}:</strong> `;
  if (net === 'ugc-jrf') snap += t('netJRF') + ' ';
  else if (net === 'ugc-ap') snap += t('netHolder') + ' ';
  else if (appeared) snap += t('netAppeared') + ' ';
  else snap += t('netNotCleared') + ' ';
  snap += `| ${subject} | ${cat.toUpperCase()} | ${STATES.find(s=>s.v===state)?.[lang] || state}`;
  html += `<div class="snapshot">${snap}</div>`;

  // Eligibility
  html += `<div class="sec-title">${lang==='en'?'Core Eligibility':'मुख्य पात्रता'}</div>`;
  if (!marksOK) html += card(t('marksBlocker'),'not',t('marksBlockerDesc'));
  if (!netCleared && !appeared) html += card(t('netPriority'),'maybe',t('netPriorityDesc'));
  else if (appeared) html += card(t('netPriority'),'maybe',t('netAppDesc'));
  else html += card(t('netConfirmed'),'elig',t('netConfirmedDesc'));
  if (hasPhD) html += card(t('phdExempt'),'elig',t('phdExemptDesc'));

  // Recommended SET
  html += `<div class="sec-title">${t('recSet')}</div>`;
  const s = SETS[state];
  if (s) {
    if (NO_SET_STATES.includes(state)) {
      html += card(s.name,'not',t('notApplicable') + ' ' + s.notes[lang]);
    } else {
      const special = state==='NE' ? `<strong style="color:var(--green);">★ ${lang==='en'?'Multi-state':'बहु-राज्य'}:</strong> ${s.validity[lang]}<br>` : '';
      html += `<div class="card"><div class="card-head"><div><div class="card-name">${s.name}</div><div class="card-sub">${s.body[lang]} • ${s.validity[lang]}</div></div><a href="${s.web}" target="_blank" class="badge elig" style="text-decoration:none;">${lang==='en'?'Apply':'आवेदन'} ↗</a></div><div class="card-body">${special}<strong>${lang==='en'?'Why it matters':'यह क्यों महत्वपूर्ण है'}:</strong> ${s.notes[lang]}<br><strong>${lang==='en'?'Subjects':'विषय'}:</strong> ${s.subjects[lang]} | <strong>${lang==='en'?'Fee':'शुल्क'}:</strong> ${s.fee} | <strong>${lang==='en'?'Frequency':'आवृत्ति'}:</strong> ${s.freq[lang]}</div></div>`;
    }
  }
  if (geo==='multi' && state==='MH') html += `<div class="card"><div class="card-body"><strong>${t('multiBonus')}</strong>${lang==='en'?'MH-SET is also valid in Goa — no extra exam needed.':'MH-SET गोवा में भी मान्य है।'}</div></div>`;
  if (geo==='multi' && state==='NE') html += `<div class="card"><div class="card-body"><strong>${t('multiBonus')}</strong>${lang==='en'?'NE-SLET already covers 8 states.':'NE-SLET पहले से 8 राज्यों को कवर करती है।'}</div></div>`;

  // Benefits summary
  html += `<div class="sec-title">${t('whyBoth')}</div>`;
  html += `<div class="ben-grid"><div class="ben"><strong>${t('ben1t')}</strong>${t('ben1d')}</div><div class="ben"><strong>${t('ben2t')}</strong>${t('ben2d')}</div><div class="ben"><strong>${t('ben3t')}</strong>${t('ben3d')}</div><div class="ben"><strong>${t('ben4t')}</strong>${t('ben4d')}</div></div>`;

  // Roadmap
  html += `<div class="sec-title">${t('roadmap')}</div><div class="card"><div class="card-body">`;
  let steps = [];
  if (!netCleared || appeared) steps.push(`<strong>${t('roadNow')}:</strong> ${lang==='en'?'Register for the next UGC NET cycle (June/December). Focus on Paper 1 + your subject paper.':'अगले UGC NET चक्र (जून/दिसंबर) के लिए पंजीकरण करें। पेपर 1 + अपने विषय पेपर पर ध्यान दें।'}`);
  if (netCleared) steps.push(`<strong>${t('roadNow')}:</strong> ${lang==='en'?'Start applying to AP vacancies — you are already eligible.':'AP रिक्तियों के लिए आवेदन शुरू करें — आप पहले से पात्र हैं।'}`);
  if (!NO_SET_STATES.includes(state)) steps.push(`<strong>${t('roadBackup')}:</strong> ${lang==='en'?'Track your state SET notification — clear it for domicile advantage.':'अपने राज्य SET अधिसूचना ट्रैक करें — डोमिसाइल लाभ के लिए उत्तीर्ण करें।'}`);
  steps.push(`<strong>${t('roadAlerts')}:</strong> ${lang==='en'?'Monitor UPHESC, state PSC, and university career portals weekly.':'साप्ताहिक रूप से UPHESC, राज्य PSC और विश्वविद्यालय कैरियर पोर्टल देखें।'}`);
  if (!hasPhD) steps.push(`<strong>${t('roadLong')}:</strong> ${lang==='en'?'Plan PhD admission — JRF opens funded routes; UGC-compliant PhD gives NET exemption.':'PhD प्रवेश की योजना बनाएं — JRF वित्त पोषित मार्ग खोलता है; UGC-अनुपालन PhD, NET छूट देती है।'}`);
  html += steps.map(s => `• ${s}`).join('<br>') + '</div></div>';

  // Vacancy sources
  html += `<div class="sec-title">${t('vacTrack')}</div>`;
  html += `<table><thead><tr><th>${lang==='en'?'Source':'स्रोत'}</th><th>${lang==='en'?'What to watch':'क्या देखें'}</th><th>${lang==='en'?'Link':'लिंक'}</th></tr></thead><tbody>`;
  if (s && !NO_SET_STATES.includes(state)) html += `<tr><td>${s.name}</td><td>SET + AP</td><td><a href="${s.web}" target="_blank">Open</a></td></tr>`;
  html += `<tr><td>UGC</td><td>${lang==='en'?'Central university recruitment':'केंद्रीय विश्वविद्यालय भर्ती'}</td><td><a href="https://www.ugc.gov.in" target="_blank">ugc.gov.in</a></td></tr>`;
  html += `<tr><td>NTA</td><td>UGC NET</td><td><a href="https://ugcnet.nta.ac.in" target="_blank">ugcnet.nta.ac.in</a></td></tr>`;
  html += `<tr><td>${lang==='en'?'Employment News':'रोजगार समाचार'}</td><td>${lang==='en'?'Weekly consolidated':'साप्ताहिक समेकित'}</td><td><a href="https://employmentnews.gov.in" target="_blank">Open</a></td></tr>`;
  html += '</tbody></table>';
  html += `<div class="disclaimer">${t('disclaimer')}</div>`;

  document.getElementById('results').innerHTML = html;
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}

function v(id) { return document.getElementById(id).value; }
function card(title, status, body) {
  const labels = {elig: '✓', maybe: '⚠', not: '✗'};
  return `<div class="card"><div class="card-head"><div class="card-name">${title}</div><span class="badge ${status}">${labels[status]}</span></div><div class="card-body">${body}</div></div>`;
}

// Init
applyLang();
</script>
</body>
</html>
